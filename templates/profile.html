{{define "content"}}
{{$user := .User}}

<div class="detail-grid">
    <div class="card">
        <div class="card-header">
            <h3>个人信息</h3>
        </div>
        <form method="POST" action="/profile/update">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" value="{{$user.Username}}" disabled>
            </div>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" name="name" value="{{$user.Name}}" required>
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" value="{{$user.Email}}">
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>

    <div class="card">
        <div class="card-header">
            <h3>业务设置</h3>
        </div>
        <form method="POST" action="/profile/settings">
            <div class="form-group">
                <label>默认时薪 ({{$user.Currency}})</label>
                <input type="number" name="hourly_rate" step="0.01" value="{{$user.HourlyRate}}">
            </div>
            <div class="form-group">
                <label>币种</label>
                <select name="currency">
                    <option value="CNY" {{if eq $user.Currency "CNY"}}selected{{end}}>人民币 (CNY)</option>
                    <option value="USD" {{if eq $user.Currency "USD"}}selected{{end}}>美元 (USD)</option>
                    <option value="EUR" {{if eq $user.Currency "EUR"}}selected{{end}}>欧元 (EUR)</option>
                </select>
            </div>
            <div class="form-group">
                <label>税率 (%)</label>
                <input type="number" name="tax_rate" step="0.01" value="{{$user.TaxRate}}">
            </div>
            <button type="submit" class="btn btn-primary">保存设置</button>
        </form>
    </div>

    <div class="card">
        <div class="card-header">
            <h3>修改密码</h3>
        </div>
        <form method="POST" action="/profile/password">
            <div class="form-group">
                <label>当前密码</label>
                <input type="password" name="current_password" required>
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" name="new_password" required>
            </div>
            <button type="submit" class="btn btn-primary">修改密码</button>
        </form>
    </div>
</div>
{{end}}
