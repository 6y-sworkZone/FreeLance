{{define "layout"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} - 自由职业者工作台</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <span>自由工作台</span>
        </div>
        <nav class="nav-menu">
            <a href="/" class="nav-item {{if eq .Active "home"}}active{{end}}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                工作台
            </a>
            <a href="/clients" class="nav-item {{if eq .Active "clients"}}active{{end}}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
                </svg>
                客户管理
            </a>
            <a href="/projects" class="nav-item {{if eq .Active "projects"}}active{{end}}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                </svg>
                项目管理
            </a>
            <a href="/time" class="nav-item {{if eq .Active "time"}}active{{end}}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                工时追踪
            </a>
            <a href="/invoices" class="nav-item {{if eq .Active "invoices"}}active{{end}}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                发票管理
            </a>
            <a href="/quotes" class="nav-item {{if eq .Active "quotes"}}active{{end}}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                </svg>
                报价单
            </a>
            <a href="/finance" class="nav-item {{if eq .Active "finance"}}active{{end}}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
                </svg>
                财务看板
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/profile" class="nav-item {{if eq .Active "profile"}}active{{end}}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                个人设置
            </a>
        </div>
    </aside>
    <main class="main-content">
        <header class="topbar">
            <div class="breadcrumb">
                <h1>{{.Title}}</h1>
            </div>
            <div class="user-info">
                <span class="user-name">{{.User.Name}}</span>
                <a href="/logout" class="btn btn-ghost btn-sm">退出</a>
            </div>
        </header>
        <div class="content-wrapper">
            {{template "content" .}}
        </div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
